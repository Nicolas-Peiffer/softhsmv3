pipeline:
  fmt:
    image: rust
    commands:
      - rustup toolchain install nightly && rustup component add --toolchain nightly rustfmt
      - cargo +nightly fmt -- --check
    when:
      path: [ "*/src/**" , "*/Cargo.toml", ".woodpecker.yml" ]

  clippy:
    image: rust
    commands:
      - rustup component add clippy
      - apt update -y -qq && apt install -y -qq --no-install-recommends clang pkg-config nettle-dev libpcsclite-dev
      - cargo --version
      - rustc --version
      - cargo clippy --no-deps
    when:
      path: [ "*/src/**" , "*/Cargo.toml", ".woodpecker.yml" ]

  softhsm:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: cli/ci/softhsm/Dockerfile
      # do not push
      dry_run: true
      # do not refresh image
      pull_image: false
      purge: false
    when:
      path:
        include: [ 'lib/**', 'cli/**' ]

  pkcs11-scd:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: cli/ci/pkcs11-scd/Dockerfile
      # do not push
      dry_run: true
      # do not refresh image
      pull_image: false
      purge: false
    when:
      path:
        include: [ 'lib/**', 'cli/**' ]
